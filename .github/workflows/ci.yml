name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  build-test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # 3-OS matrix mirrors the release.yml target list so macOS /
    # Windows regressions surface at PR time instead of release
    # time. fmt + clippy are OS-independent — run only on ubuntu
    # to keep the matrix lean.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          path: nexo-rs-plugin-whatsapp
      # Path-deps to `../proyecto/crates/...` + sibling
      # `nexo-rs-plugin-telegram` (referenced through the proyecto
      # workspace's own path-deps). Both must check out alongside
      # this plugin or `cargo build` dies on missing manifests.
      - uses: actions/checkout@v4
        with:
          repository: lordmacu/nexo-rs
          path: proyecto
      - uses: actions/checkout@v4
        with:
          repository: lordmacu/nexo-plugin-telegram
          path: nexo-rs-plugin-telegram
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: nexo-rs-plugin-whatsapp
          key: ${{ matrix.os }}
      # `--all` would walk the path-dep'd proyecto crates and
      # fail on unrelated drift; restrict to this package.
      - if: matrix.os == 'ubuntu-latest'
        working-directory: nexo-rs-plugin-whatsapp
        run: cargo fmt -- --check
      - if: matrix.os == 'ubuntu-latest'
        working-directory: nexo-rs-plugin-whatsapp
        run: cargo clippy --all-targets --no-deps -- -D warnings
      - working-directory: nexo-rs-plugin-whatsapp
        run: cargo build --locked
      - working-directory: nexo-rs-plugin-whatsapp
        run: cargo test --locked
