# Phase 81.19.a ‚Äî manifest for the out-of-tree WhatsApp plugin.
#
# Bundled into the binary at compile-time via
# `include_str!("../nexo-plugin.toml")` in `src/main.rs`. The daemon
# parses this on the JSON-RPC `initialize` reply and validates the
# `[plugin.capabilities.broker]` allowlist against its boot policy
# before routing the first message.

[plugin]
id              = "whatsapp"
version         = "0.4.4"
name            = "WhatsApp Bot"
description     = "WhatsApp channel plugin via wa-agent (Signal Protocol + Bot API + QR pairing)."
min_nexo_version = ">=0.1.0"

[plugin.requires]
nexo_capabilities = ["broker"]

# Declarative extension contributions. Daemon validates the
# `initialize` reply `tools` array against this list ‚Äî every advertised
# tool MUST appear here. Tool names follow the `<plugin_id>_*`
# namespace rule.
[plugin.extends]
channels = ["whatsapp"]
tools = [
    "whatsapp_send_message",
    "whatsapp_send_reply",
    "whatsapp_send_reaction",
    "whatsapp_send_media",
]

# Phase 82.15.bx ‚Äî explicit broker allowlist. Defense-in-depth so a
# misbehaving plugin can't broadcast outside the topics it declared.
# `>` matches the per-instance suffix (`whatsapp.<instance>` and
# `whatsapp` legacy single-account).
[plugin.capabilities.broker]
subscribe = [
    "plugin.outbound.whatsapp",
    "plugin.outbound.whatsapp.>",
    # Phase 81.33.b.real Stages 1+2+4+5 ‚Äî auto-discovery broker
    # handler topics. Daemon-side helpers publish here; the
    # plugin's auto-discovery subscriber loop in `src/main.rs`
    # parses + replies per the JSON contract documented at
    # `proyecto/docs/src/plugins/manifest-{pairing-adapter,http,admin,metrics}.md`.
    "plugin.whatsapp.pairing.normalize_sender",
    "plugin.whatsapp.pairing.send_reply",
    "plugin.whatsapp.pairing.send_qr_image",
    "plugin.whatsapp.http.request",
    "plugin.whatsapp.admin.>",
    "plugin.whatsapp.metrics.scrape",
]
publish   = ["plugin.inbound.whatsapp",  "plugin.inbound.whatsapp.>"]

# Plugin-driven pairing UI descriptor. Consumed by the
# admin's `nexo/admin/pairing/channels` RPC to drive the
# channel-selector + per-channel modal flow generically ‚Äî
# no per-channel hardcoded logic in the admin frontend.
[plugin.pairing]
kind  = "qr"
label = "WhatsApp"
# Phase 97 ‚Äî explicit instance label. Even for QR pairing, the
# admin wizard MUST ask the operator for a short label so the
# daemon stamps `whatsapp.yaml::instance` and the agent binding
# subscribes to the right `plugin.inbound.whatsapp.<instance>`
# topic. Multi-account support (1 daemon driving N WhatsApp bots)
# depends on this label being unique per account.
instance_field = "instance"

[[plugin.pairing.fields]]
name        = "instance"
label       = "Nombre de cuenta"
placeholder = "ventas"
help        = "Etiqueta corta para distinguir esta cuenta de otras WhatsApp del mismo daemon (sin espacios)."
required    = true

[plugin.pairing.instructions]
es = "Abr√≠ WhatsApp en tu tel√©fono ‚Üí Configuraci√≥n ‚Üí Dispositivos vinculados ‚Üí Vincular un dispositivo, y escane√° el c√≥digo QR."
en = "Open WhatsApp on your phone ‚Üí Settings ‚Üí Linked Devices ‚Üí Link a device, and scan the QR code."

# Phase 81.33.b.real Stage 1 ‚Äî pairing adapter via broker dispatch.
# Daemon's `GenericBrokerPairingAdapter` constructs from this section
# + forwards `PairingChannelAdapter` trait calls to the broker topics
# under `broker_topic_prefix`. Plugin's auto_discovery subscriber
# loop in `src/main.rs` handles each.
[plugin.pairing.adapter]
channel_id          = "whatsapp"
broker_topic_prefix = "plugin.whatsapp"

# Phase 81.20.x Stage 7 Phase 2 ‚Äî pairing trigger via broker dispatch.
# Daemon's `BrokerPairingTrigger` reads this section and forwards
# `pairing/start` and `pairing/cancel` to the plugin admin handler
# below. Replaces the in-tree `WhatsappPairingTrigger::from_configs`
# coupling: daemon no longer links this crate.
#
# Pump publishes QR rotations + terminal state on
# `plugin.inbound.whatsapp.<inst>.pairing.{qr,state}` so the daemon's
# generic pairing-inbound subscriber updates its shared
# `PairingChallengeStore` without per-channel logic.
[plugin.pairing.trigger]
start_method    = "nexo/admin/whatsapp/pairing/start"
cancel_method   = "nexo/admin/whatsapp/pairing/cancel"
timeout_seconds = 180

# Phase 81.33.b.real Stage 2 ‚Äî daemon mounts a generic HTTP proxy
# under this prefix on `:8080`. Forwards every request via
# `plugin.whatsapp.http.request` broker JSON-RPC. The plugin owns
# its internal router under the prefix (see `src/auto_discovery.rs::http_request`).
[plugin.http]
mount_prefix    = "/whatsapp"
timeout_seconds = 30

# Phase 81.33.b.real Stage 4 ‚Äî admin RPC commands forwarded via
# broker. Daemon receives `nexo/admin/whatsapp/<verb>` from operators
# + forwards to `plugin.whatsapp.admin.<verb>`.
[plugin.admin]
method_prefix       = "nexo/admin/whatsapp/"
broker_topic_prefix = "plugin.whatsapp.admin"
timeout_seconds     = 15

# Phase 81.33.b.real Stage 5 ‚Äî Prometheus metrics scrape. Daemon's
# `/metrics` aggregator iterates declarers + appends each plugin's
# scrape output. Topic: `plugin.whatsapp.metrics.scrape`.
[plugin.metrics]
prometheus          = true
broker_topic_prefix = "plugin.whatsapp"
timeout_seconds     = 5

# Phase 81.33.b.real Stage 6 ‚Äî setup wizard dashboard surface.
# WhatsApp is multi-instance per-agent; the wizard walks
# `<workspace>/<agent>/whatsapp/<instance>/` and probes session
# files inside each instance directory to decide auth state.
[plugin.dashboard.layout]
kind   = "workspace_walk"
subdir = "whatsapp"

[plugin.dashboard.auth_check]
kind       = "session_dir_files"
candidates = ["session.db", "state.db", "device.json", "registration.json"]

# Phase 93.4.b ‚Äî declarative config contract. Daemon delivers
# operator YAML at `cfg.plugins.entries.whatsapp` (Phase 93.3) via
# `plugin.configure` JSON-RPC (Phase 93.2); SDK `on_configure`
# handler deserialises into `Vec<WhatsappPluginConfig>`.
[plugin.config_schema]
shape = "array"
schema = '''{
  "type": "object",
  "properties": {
    "enabled":           { "type": "boolean" },
    "session_dir":       { "type": "string" },
    "media_dir":         { "type": "string" },
    "credentials_file":  { "type": "string" },
    "instance":          { "type": "string" },
    "allow_agents":      { "type": "array" },
    "typing_mode":       { "type": "string" },
    "acl": {
      "type": "object",
      "properties": {
        "allow_list": { "type": "array" },
        "from_env":   { "type": "string" }
      }
    },
    "behavior": {
      "type": "object",
      "properties": {
        "ignore_chat_meta":      { "type": "boolean" },
        "ignore_from_me":        { "type": "boolean" },
        "ignore_groups":         { "type": "boolean" },
        "skip_backlog_age_secs": { "type": "integer" }
      }
    },
    "rate_limit": {
      "type": "object",
      "properties": {
        "global_per_sec":  { "type": "number" },
        "per_jid_per_sec": { "type": "number" },
        "burst":           { "type": "integer" }
      }
    },
    "bridge": {
      "type": "object",
      "properties": {
        "response_timeout_ms": { "type": "integer" },
        "on_timeout":          { "type": "string" },
        "apology_text":        { "type": "string" }
      }
    },
    "transcriber": {
      "type": "object",
      "properties": {
        "enabled":    { "type": "boolean" },
        "skill":      { "type": "string" },
        "timeout_ms": { "type": "integer" }
      }
    },
    "daemon": {
      "type": "object",
      "properties": {
        "prefer_existing": { "type": "boolean" }
      }
    },
    "public_tunnel": {
      "type": "object",
      "properties": {
        "enabled":           { "type": "boolean" },
        "only_until_paired": { "type": "boolean" }
      }
    }
  }
}'''

# Phase 93.8.b ‚Äî credential store contribution (Phase 93.8.a-daemon
# manifest section). Daemon's `SubprocessNexoPlugin::credential_store()`
# reads this and constructs a `RemoteCredentialStore` round-tripping
# the four `plugin.credentials.*` JSON-RPCs to the handlers
# registered in `src/main.rs`.
[plugin.credentials_schema]
enabled = true
accounts_shape = "array"

# ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# Phase 99 ‚Äî admin UI contribution (Mode A, declarative).
# Static config screen; daemon synthesises the form + validates a
# save against `[plugin.config_schema]` (merged) + hot-applies. The
# Signal session / paired credentials stay out (managed via QR
# pairing); partial saves keep them. Needs manifest >= 0.1.8.
# ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
[plugin.admin_ui]
schema_version = 1
mode           = "declarative"
describe       = false

[[plugin.admin_ui.contributions]]
id     = "whatsapp"
slot   = "plugin.whatsapp.root"
label  = "WhatsApp"
icon   = "message-circle"
order  = 1000
screen = "settings"

[[plugin.admin_ui.screens]]
id    = "settings"
title = "WhatsApp Settings"

[[plugin.admin_ui.screens.fields]]
key   = "enabled"
type  = "toggle"
label = "Enabled"

[[plugin.admin_ui.screens.fields]]
key   = "instance"
type  = "text"
label = "Instance label"

[[plugin.admin_ui.screens.fields]]
key   = "session_dir"
type  = "text"
label = "Session dir"

[[plugin.admin_ui.screens.fields]]
key   = "media_dir"
type  = "text"
label = "Media dir"

[[plugin.admin_ui.screens.fields]]
key   = "typing_mode"
type  = "text"
label = "Typing mode"
